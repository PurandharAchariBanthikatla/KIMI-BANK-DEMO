server:
  port: ${PORT:8080}

spring:
  application:
    name: kimibank-core

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

kimibank:
  jwt:
    secret: "CHANGE_ME_32_BYTE_MIN_SECRET_KEY_FOR_DEV_ONLY"
    access-token-minutes: 15
    refresh-token-days: 30

  otp:
    length: 6
    ttl-seconds: 300
    max-attempts: 5
    dev-mode: true

logging:
  level:
    com.kimibank: DEBUG
